
<html>
<head>
    <title>Job Search - Jobs</title>

<body>
    <div class="titleBar">
        <a href="landing.html">
            <img src="../src/img/talentsy.png" width="200">
        </a>
        <div class="tbLeftCont">
            <a class="titleBarLink" href="My jobs.html">My applications</a>
            <a class="titleBarLinkEnd" href="add-job.html">Post a Job</a>
        </div>
        <div class="tbRightCont">

        </div>

            </form>
        </div>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #ddd;">
        
        <h2 class="uCenter" style="margin-bottom: 30px; color: #1a237e;">All Available Jobs</h2>
        
        <div id="jobList">
            </div> 
    </div>
