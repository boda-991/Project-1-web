<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Job</title>
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/admin.css">
</head>
<body class="admin-page">
    <div class="titleBar">
        <a href="landing.html">
            <img src="../src/img/talentsy.png" width="220" alt="Talentsy">
        </a>
        <div class="tbLeftCont">
            <a class="titleBarLink" href="add-edit-job.html">Admin Home</a>
            <a class="titleBarLink" href="admin-dashboard.html">Dashboard</a>
            <a class="titleBarLinkEnd" href="edit-job.html">Edit Jobs</a>
        </div>
        <div class="tbRightCont">
            <a class="btnSecondary uLink" href="jobs.html">View Public Jobs</a>
        </div>
    </div>

    <main class="container admin-shell">
        <section class="admin-section admin-form-section">
            <div class="admin-section__header">
                <div>
                    <p class="admin-kicker">Create Listing</p>
                    <h1>Add a new job</h1>
                    <p class="admin-lead">Fill in the essential role details. Any compatibility fields used by the public jobs pages will be safely defaulted behind the scenes.</p>
                </div>
                <img src="../src/img/job_ico.png" alt="" width="72">
            </div>

            <div id="form-feedback" class="notice" hidden></div>

            <form id="job-form" class="admin-form">
                <div class="form-grid">
                    <label class="form-field">
                        <span>Job Title</span>
                        <input type="text" id="jtitle" placeholder="Frontend Developer" required>
                    </label>

                    <label class="form-field">
                        <span>Company</span>
                        <input type="text" id="companyP" placeholder="Talentsy" required>
                    </label>

                    <label class="form-field">
                        <span>Posted On</span>
                        <input type="date" id="dateP" required>
                    </label>

                    <label class="form-field form-field--full">
                        <span>Job Description</span>
                        <textarea id="jobDescP" rows="5" placeholder="Describe the role, its impact, and who would thrive in it." required></textarea>
                    </label>

                    <label class="form-field form-field--full">
                        <span>Key Responsibilities</span>
                        <textarea id="responsibilitiesP" rows="5" placeholder="Write one responsibility per line."></textarea>
                    </label>

                    <label class="form-field form-field--full">
                        <span>Required Skills and Qualifications</span>
                        <textarea id="skills" rows="5" placeholder="Write one skill or qualification per line."></textarea>
                    </label>

                    <label class="form-field">
                        <span>Experience (Years)</span>
                        <input type="number" id="experience" placeholder="e.g., 3" required>
                    </label>
                </div>

                <div class="form-actions">
                    <button class="btn" type="submit">Save Job</button>
                    <a class="btnSecondary uLink" href="admin-dashboard.html">Back to Dashboard</a>
                </div>
            </form>
        </section>
    </main>

    <script src="../src/js/utils.js"></script>
    <script src="../src/js/job-form.js"></script>
    <script src="../src/js/add-job.js"></script>
</body>
</html>
