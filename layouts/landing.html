{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talentsy</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
</head>
<body>
    <div class="titleBar">
        <a href="{% url 'landing' %}">
            <img src="{% static 'img/talentsy.png' %}" width="250">
        </a>
<div class="tbLeftCont">
    <a class="titleBarLink" href="{% url 'jobs' %}" id="jobs-link">Find Jobs</a>

    <a class="titleBarLink" href="{% url 'my-jobs' %}" id="my-jobs-link">My Jobs</a>
<!-- for test  -->
    <a class="titleBarLink" href="{% url 'landing' %}" id="admin-dashboard-link">My Job Posts</a>

    <a class="titleBarLinkEnd" href="{% url 'add-job' %}" id="post-job-link">Post a Job</a>
</div>
        <div class="tbRightCont">
            <a href="{% url 'login-register_page' %}" id="login-link">
                 <button class="btn">Sign-Up</button>
            </a>
            <button id="btn-logout" class="btnSecondary" onclick="logout()">Logout</button>
        </div>
        
    </div>

    <div class="hero">
        <div class="heroLeft">
            <h1 class="heroLeftText">Find Your Dream Job Now</h1>
            <p class="heroLeftPara">Start your new adventure today.</p>
            <br>
            <p class="heroLeftPara">Explore top oppurtonities in all industries!</p>
            <br>
            <div class="heroLeftBtnCont">
                <button class="landingBtn"onclick="window.location.href='jobs.html'">Browse Now</button>
                <button class="landingBtnSecondary" onclick="window.location.href='add-job.html'">Find Talent</button>
            </div>
            
        </div>
        <div class="heroRight">
            <img src="" alt="">
            
        </div>
    </div>
    <div class="hero2">
        <div class="heroCard card3">
            <div class="heroCardItem">
                <img src="{% static 'img/job_ico.png' %}" width="50px">
                <p>150k+ Job Postings</p>
            </div>
            <div class="heroCardItem">
                <img src="{% static 'img/company_ico.png' %}" width="50px">
                <p>10k+ Verified Companies</p>
            </div>

            <div class="heroCardItemEnd">
                <img src="{% static 'img/worker_ico.png' %}" width="50px">
                <p>600k+ Job Seakers</p>
            </div>
            
        </div>
    </div>
    <script src="{% static 'js/roles.js' %}"></script>
</body>
</html>
