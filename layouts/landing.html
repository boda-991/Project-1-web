<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talentsy</title>
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/landing.css">
</head>
<body>
    <div class="titleBar">
        <a href="landing.html">
            <img src="../src/img/talentsy.png" width="250">
        </a>
        <div class="tbLeftCont">
            <a class="titleBarLink" href="jobs.html" id="jobs-link">Find Jobs</a>
            <a class="titleBarLink" href="My jobs.html" id="my-jobs-link">My Jobs</a>
            <a class="titleBarLink" href="admin-dashboard.html" id="admin-dashboard-link">My Job Posts</a>
            <a class="titleBarLinkEnd" href="add-job.html" id="post-job-link">Post a Job</a>
        </div>
        <div class="tbRightCont">
            <a href="../layouts/Login_register.html" id="login-link">
                 <button class="btn">Sign-Up</button>
            </a>
            <button id="btn-logout" class="btnSecondary" onclick="logout()">Logout</button>
        </div>
        
    </div>

    <div class="hero">
        <div class="heroLeft">
            <h1 class="heroLeftText">Find Your Dream Job Now</h1>
            <p class="heroLeftPara">Start your new adventure today.</p>
            <br>
            <p class="heroLeftPara">Explore top oppurtonities in all industries!</p>
            <br>
            <div class="heroLeftBtnCont">
                <button class="landingBtn"onclick="window.location.href='jobs.html'">Browse Now</button>
                <button class="landingBtnSecondary" onclick="handleFindTalentClick()">Find Talent</button>
            </div>
            
        </div>
        <div class="heroRight">
            <img src="" alt="">
            
        </div>
    </div>
    <div class="hero2">
        <div class="heroCard card3">
            <div class="heroCardItem">
                <img src="../src/img/job_ico.png" width="50px">
                <p>150k+ Job Postings</p>
            </div>
            <div class="heroCardItem">
                <img src="../src/img/company_ico.png" width="50px">
                <p>10k+ Verified Companies</p>
            </div>

            <div class="heroCardItemEnd">
                <img src="../src/img/worker_ico.png" width="50px">
                <p>600k+ Job Seakers</p>
            </div>
            
        </div>
    </div>
    <script>
        function handleFindTalentClick() {
            let currentUser = null;

            try {
                currentUser = JSON.parse(localStorage.getItem("currentUser"));
            } catch (error) {
                currentUser = null;
            }

            if (!currentUser || !currentUser.accessToken || !currentUser.is_admin) {
                alert("Please log in as an admin user to post jobs.");
                return;
            }

            window.location.href = "add-job.html";
        }
    </script>
    <script src="../src/js/roles.js"></script>
</body>
</html>
