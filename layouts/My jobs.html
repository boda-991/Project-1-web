{% load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Jobs</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/myJobs.css' %}">
</head>
<body>
<div class="titleBar">
        <a href="{% url 'landing' %}">
            <img src="{% static 'img/talentsy.png' %}" width="250">
        </a>
        <div class="tbLeftCont">
            <a class="titleBarLink" href="{% url 'jobs' %}" id="jobs-link">Find Jobs</a>

            <a class="titleBarLink" href="{% url 'my-jobs' %}" id="my-jobs-link">My Jobs</a>
            <a class="titleBarLink" href="{% url 'admin-dashboard' %}" id="admin-dashboard-link">My Job Posts</a>

            <a class="titleBarLinkEnd" href="{% url 'add-job' %}" id="post-job-link">Post a Job</a>        </div>
        <div class="tbRightCont">
            <a href="{% url 'login-register_page' %}" id="login-link">
                 <button class="btn">Sign-Up</button>
            </a>
            <button id="btn-logout" class="btnSecondary" onclick="logout()">Logout</button>
        </div>
        
    </div>
<div class="container">
    <h1 class="jobt">My Applied Jobs</h1>
</div>
<table class="container">
    <thead>
        <tr>
            <th>Job Title</th>
            <th>Company Name</th>
            <th>Application Date</th>
            <th>Job Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="application-table">
    </tbody>
</table>
<script src="{% static 'js/my-jobs.js' %}"></script> 
<script src="{% static 'js/roles.js' %}"></script>
</body>
</html>
